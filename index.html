<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>求职公司库 + 投递看板 + JD 收集</title>

  <style>
    :root{
      --bg:#070a14;
      --text:#e9ecff;
      --muted:rgba(233,236,255,.70);
      --muted2:rgba(233,236,255,.46);
      --line:#22305b;
      --accent:#7aa2ff;
      --good:#3ddc97;
      --warn:#ffd166;
      --bad:#ff6b6b;

      --shadow: 0 12px 40px rgba(0,0,0,.42);
      --radius:18px;

      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --c1:#7aa2ff; --c2:#3ddc97; --c3:#ffd166; --c4:#ff6b6b; --c5:#c084fc; --c6:#94a3b8;
    }

    *{box-sizing:border-box}
    html, body { height: 100%; }
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 12% 0%, #1c2a63 0%, rgba(28,42,99,0) 55%),
        radial-gradient(900px 600px at 86% 8%, #3b1f5c 0%, rgba(59,31,92,0) 55%),
        linear-gradient(180deg, var(--bg), #050711 70%);
      min-height:100dvh;
      overflow-x:hidden;
      -webkit-text-size-adjust: 100%;
      line-height: 1.55;
      letter-spacing: .1px;
    }
    a{color:inherit; text-decoration:none}
    button{font-family:inherit}

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:
        calc(18px + env(safe-area-inset-top, 0px))
        calc(14px + env(safe-area-inset-right, 0px))
        calc(56px + env(safe-area-inset-bottom, 0px))
        calc(14px + env(safe-area-inset-left, 0px));
    }

    /* Header */
    header{
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .hero{min-width: 260px; flex: 1 1 520px;}
    h1{margin:0;font-size:24px;letter-spacing:.2px; line-height:1.18}

    .subWrap{margin-top:8px; position:relative;}
    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      max-width:980px;
      white-space:pre-wrap;
    }
    .subToggle{
      margin-top:8px;
      display:none;
      padding:8px 10px;
      border-radius:12px;
      font-size:12px;
      line-height:1.2;
    }

    .pills{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(122,162,255,.25);
      background: rgba(122,162,255,.10);
      font-size:12px; color:#dbe6ff; white-space:nowrap;
      line-height:1.2;
    }
    .pill.good{border-color:rgba(61,220,151,.25);background:rgba(61,220,151,.10)}
    .pill.warn{border-color:rgba(255,209,102,.25);background:rgba(255,209,102,.10)}
    .pill.bad{border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.10)}

    /* Buttons */
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      flex: 0 0 auto;
    }
    button, .btn{
      border:1px solid var(--line);
      background: linear-gradient(180deg, #18244b, #111a33);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
      font-weight:850;
      font-size:13px;
      line-height:1.15;
      transition: transform .06s ease, border-color .15s ease, opacity .15s ease;
      user-select:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      white-space:nowrap;
    }
    button:hover, .btn:hover{ border-color:#3853a8;}
    button:active, .btn:active{ transform: translateY(1px); }
    button.secondary{ background: linear-gradient(180deg, #131a34, #0d1328); }
    button.danger{ background: linear-gradient(180deg, #3a1621, #22111a); border-color:#6b2a3c; }
    button.ghost{
      background: rgba(10,14,28,.55);
      border-color: rgba(34,48,91,.95);
      box-shadow:none;
    }
    button:disabled{opacity:.55; cursor:not-allowed}

    /* Top tabs (sticky on mobile) */
    .tabsBar{ margin: 10px 0 12px; }
    .navTitle{
      font-size:11px;
      color:var(--muted2);
      font-weight:900;
      letter-spacing:.55px;
      margin: 0 0 10px;
      line-height:1.2;
      text-transform: none;
    }
    .tabs{
      display:flex;
      gap:10px;
    }
    .tab{
      flex:1;
      text-align:center;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(34,48,91,.95);
      background: rgba(10,14,28,.55);
      cursor:pointer;
      user-select:none;
      font-weight:900;
      font-size:13px;
      line-height:1.15;
    }
    .tab.active{
      border-color:rgba(122,162,255,.45);
      background: rgba(122,162,255,.10);
    }

    /* Layout */
    .layout{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:14px;
      margin-top: 14px;
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .side{position:static}
    }

    .card{
      background: linear-gradient(180deg, rgba(17,26,51,.92), rgba(10,14,28,.85));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
    }
    .side{
      position: sticky;
      top: 12px;
      height: fit-content;
    }

    /* Side collapse header */
    .sideHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    /* Forms */
    input[type="text"], input[type="url"], input[type="date"], input[type="number"], textarea, select{
      width:100%;
      background: rgba(7,10,20,.55);
      border:1px solid var(--line);
      color: var(--text);
      padding:10px 10px;
      border-radius:12px;
      outline:none;
      font-size:13px;
      line-height:1.25;
    }
    textarea{min-height:110px; resize:vertical; line-height:1.45}
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px 2px;
      font-weight:900;
      line-height:1.2;
    }
    .row{display:flex; gap:10px; flex-wrap:wrap}
    .row > *{flex:1}
    .hint{font-size:12px; color:var(--muted2); line-height:1.4}
    .muted{color:var(--muted); font-size:12px; line-height:1.45}
    .small{font-size:12px;color:var(--muted2); line-height:1.4}
    .mono{font-family:var(--mono)}

    /* Side boards */
    .boardList{display:grid; gap:8px}
    .boardBtn{
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(34,48,91,.95);
      background: rgba(10,14,28,.55);
      cursor:pointer;
      user-select:none;
    }
    .boardBtn.active{border-color:rgba(122,162,255,.45); background: rgba(122,162,255,.10)}
    .boardBtn .name{font-weight:900; font-size:13px; line-height:1.2}
    .boardBtn .desc{margin-top:4px;color:var(--muted2);font-size:12px;line-height:1.35}

    /* Company cards */
    .sectionTitle{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px}
    .sectionTitle h2{margin:0;font-size:16px;letter-spacing:.2px; line-height:1.25}
    .chips{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .chip{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(34,48,91,.95);
      background: rgba(10,14,28,.55);
      font-size:12px;
      color:var(--muted);
      line-height:1.2;
    }

    .list{display:grid; gap:12px}
    .company{
      border:1px solid rgba(34,48,91,.95);
      background: rgba(10,14,28,.45);
      border-radius: 18px;
      padding:12px;
    }
    .companyTop{
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap;
      margin-bottom:10px;
    }
    .companyName{
      display:flex; flex-direction:column; gap:2px;
      min-width: 220px;
    }
    .companyName .zh{font-weight:950; font-size:15px; line-height:1.2}
    .companyName .en{color:var(--muted2); font-size:12px; line-height:1.25}
    .companyMeta{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .badge{
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid rgba(122,162,255,.25);
      background: rgba(122,162,255,.10);
      color:#dbe6ff;
      white-space:nowrap;
      line-height:1.2;
    }
    .badge.good{border-color:rgba(61,220,151,.25); background: rgba(61,220,151,.10)}
    .badge.warn{border-color:rgba(255,209,102,.25); background: rgba(255,209,102,.10)}
    .badge.bad{border-color:rgba(255,107,107,.25); background: rgba(255,107,107,.10)}
    .companyActions{display:flex; gap:8px; flex-wrap:wrap; align-items:center}

    .posList{display:grid; gap:8px; margin-top:10px}
    .pos{
      border:1px solid rgba(34,48,91,.85);
      background: rgba(5,7,17,.45);
      border-radius: 14px;
      padding:10px;
    }
    .posTop{
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .posTitle{font-weight:900; font-size:13px; line-height:1.25}
    .posSub{color:var(--muted2); font-size:12px; margin-top:4px; line-height:1.4}
    .posGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: 1.2fr .8fr .8fr .9fr .9fr;
      gap:10px;
      align-items:end;
    }
    @media (max-width: 980px){
      .posGrid{grid-template-columns:1fr}
    }
    .posActions{display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end}

    /* Dashboard */
    .dashGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    @media (max-width: 980px){
      .dashGrid{grid-template-columns:1fr}
    }
    .kpis{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .kpi{
      border:1px solid rgba(34,48,91,.95);
      background: rgba(10,14,28,.55);
      border-radius: 16px;
      padding:12px;
    }
    .kpi .label{color:var(--muted2); font-size:12px; font-weight:900; line-height:1.2}
    .kpi .value{font-size:22px; font-weight:950; margin-top:6px; line-height:1.1}
    .legend{display:grid; gap:8px; margin-top:10px}
    .legendItem{display:flex; gap:10px; align-items:center; justify-content:space-between}
    .dot{width:10px; height:10px; border-radius:999px; background: var(--accent)}
    .legendLeft{display:flex; gap:10px; align-items:center}
    .legendLeft span{font-size:12px; color:var(--muted); line-height:1.2}
    .legendRight{font-size:12px; color:var(--muted2); font-family:var(--mono)}

    /* JD */
    .jdList{display:grid; gap:10px}
    .jd{
      border:1px solid rgba(34,48,91,.95);
      background: rgba(10,14,28,.55);
      border-radius: 18px;
      padding:12px;
    }
    .jdTop{display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap}
    .jdTitle{font-weight:950; font-size:14px; line-height:1.25}
    .jdSub{color:var(--muted2); font-size:12px; margin-top:4px; line-height:1.35}
    .jdActions{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .jdTags{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}

    /* Toast */
    .toast{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      background: rgba(10,14,28,.85);
      border: 1px solid rgba(34,48,91,.95);
      padding: 10px 12px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      font-size: 12px;
      color: var(--muted);
      z-index: 999;
      display:none;
      max-width: min(520px, calc(100vw - 24px));
      line-height:1.25;
    }

    /* Modal */
    .modalBackdrop{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 1000;
    }
    .modal{
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(17,26,51,.98), rgba(10,14,28,.92));
      border: 1px solid rgba(34,48,91,.95);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .modalHeader{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .modalHeader h3{margin:0; font-size:16px; line-height:1.25}
    .modalBody{display:grid; gap:10px; margin-top:6px}
    .modalFooter{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; margin-top:12px}

    /* Mobile app-like */
    @media (max-width: 520px){
      .wrap{
        padding:
          calc(12px + env(safe-area-inset-top, 0px))
          calc(12px + env(safe-area-inset-right, 0px))
          calc(44px + env(safe-area-inset-bottom, 0px))
          calc(12px + env(safe-area-inset-left, 0px));
      }

      header{ margin-bottom:10px; gap:10px; }
      h1{ font-size:18px; line-height:1.18; }

      .pills{
        flex-wrap:nowrap;
        overflow:auto;
        -webkit-overflow-scrolling:touch;
        padding-bottom:6px;
      }

      .subToggle{ display:inline-flex; }

      .subWrap.collapsed .sub{
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }

      .toolbar{
        justify-content:flex-start;
        gap:8px;
        width:100%;
      }
      .toolbar button, .toolbar .btn{
        flex: 1 1 calc(50% - 8px);
        min-width: 0;
        justify-content:center;
        padding:10px 10px;
        font-size:14px;
      }

      /* iPhone: prevent input zoom */
      input[type="text"], input[type="url"], input[type="date"], input[type="number"], textarea, select{
        font-size:16px;
      }

      .tabsBar{
        position: sticky;
        top: calc(env(safe-area-inset-top, 0px) + 6px);
        z-index: 80;
        padding: 10px 0 8px;
        backdrop-filter: blur(10px);
      }
      .tabs{
        padding: 8px;
        border-radius: 18px;
        background: rgba(10,14,28,.72);
        border: 1px solid rgba(34,48,91,.9);
        gap:8px;
      }
      .tab{ padding:10px 8px; font-size:12px; }

      .layout{ gap:10px; margin-top:10px; }
      .card{ padding:12px; }

      /* Side panel: default collapsed via JS; expanded gets a max height & internal scroll */
      #sidePanel.expanded{
        max-height: 62dvh;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }
      #sidePanel.collapsed #sideBody{
        display:none;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="hero">
        <h1 id="titleText">求职公司库 · 投递看板 · JD 收集</h1>

        <div class="subWrap collapsed" id="subWrap">
          <div class="sub" id="subText">公司 → 岗位子清单：按岗位跟踪进度（地点/薪资/渠道/状态/链接/备注）
投递看板 Dashboard：扇形图可视化 + 官网投递数量统计
JD 收集：收藏喜欢的 JD，方便对照学习
数据只保存在你浏览器本地（LocalStorage），可导入/导出 JSON 进行备份或跨设备同步</div>
          <button class="secondary subToggle" id="subToggle" type="button">展开说明</button>
        </div>

        <div class="pills" id="pills">
          <span class="pill good">本地自动保存</span>
          <span class="pill warn">可导入/导出</span>
          <span class="pill">岗位级追踪</span>
          <span class="pill">扇形图</span>
          <span class="pill">JD 对照</span>
        </div>
      </div>

      <div class="toolbar">
        <button class="ghost" id="langBtn" type="button">中文 / EN</button>
        <button class="secondary" id="exportBtn" type="button">导出 JSON</button>
        <button class="secondary" id="importBtn" type="button">导入 JSON</button>
        <input id="importFile" type="file" accept="application/json" style="display:none"/>
        <button id="addCompanyBtn" type="button">新增公司</button>
        <button id="addJdBtn" type="button">新增 JD</button>
        <button class="danger" id="resetBtn" type="button">重置数据</button>
      </div>
    </header>

    <div class="tabsBar">
      <div class="navTitle" id="navTitle">页面</div>
      <div class="tabs">
        <div class="tab active" data-tab="companies" id="tabCompanies">公司库</div>
        <div class="tab" data-tab="dashboard" id="tabDashboard">投递看板</div>
        <div class="tab" data-tab="jd" id="tabJd">JD 收集</div>
      </div>
    </div>

    <div class="layout">
      <aside class="side card" id="sidePanel">
        <div class="sideHead">
          <div class="navTitle" id="boardTitle">企业清单</div>
          <button class="ghost" id="sideCollapseBtn" type="button">展开</button>
        </div>

        <div id="sideBody">
          <div class="boardList" id="boardList"></div>

          <div style="margin-top:12px" class="navTitle" id="filterTitle">筛选</div>
          <div class="row">
            <div>
              <label id="lblStatus">状态</label>
              <select id="statusFilter"></select>
            </div>
            <div>
              <label id="lblSource">渠道</label>
              <select id="sourceFilter"></select>
            </div>
          </div>

          <div style="margin-top:10px">
            <label id="lblSearch">搜索</label>
            <input id="searchInput" type="text" placeholder="公司 / 岗位 / 标签"/>
            <div class="hint" id="searchHint" style="margin-top:6px">提示：状态筛选会只显示匹配的公司及其匹配岗位</div>
          </div>

          <div style="margin-top:12px" class="small" id="syncHint">
            多人同时用（实时共享）需要云端数据库；目前可用“导出/导入 JSON”在设备之间同步或分享。
          </div>
        </div>
      </aside>

      <main class="main" id="main"></main>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <div class="modalBackdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHeader">
        <h3 id="modalTitle">Modal</h3>
        <button class="ghost" id="modalCloseBtn" type="button">关闭</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
      <div class="modalFooter" id="modalFooter"></div>
    </div>
  </div>

  <script>
    // -----------------------
    // i18n
    // -----------------------
    const I18N = {
      zh: {
        title: "求职公司库 · 投递看板 · JD 收集",
        pages: "页面",
        companies: "公司库",
        dashboard: "投递看板",
        jd: "JD 收集",
        boards: "企业清单",
        filters: "筛选",
        status: "状态",
        source: "渠道",
        search: "搜索",
        searchPh: "公司 / 岗位 / 标签",
        searchHint: "提示：状态筛选会只显示匹配的公司及其匹配岗位",
        syncHint: "多人同时用（实时共享）需要云端数据库；目前可用“导出/导入 JSON”在设备之间同步或分享。",
        export: "导出 JSON",
        import: "导入 JSON",
        addCompany: "新增公司",
        addJd: "新增 JD",
        reset: "重置数据",
        toggleDescOpen: "展开说明",
        toggleDescClose: "收起说明",
        btnClose: "关闭",

        btnSave: "保存",
        btnAdd: "添加",
        btnEdit: "编辑",
        btnDelete: "删除",
        btnAddRole: "新增岗位",
        btnViewLink: "打开链接",
        empty: "暂无数据",
        confirmReset: "确认清空全部数据？此操作不可撤销。",
        toastSaved: "已保存 ✅",
        toastImported: "已导入 ✅",
        toastExported: "已导出 ✅",
        toastReset: "已重置 ✅",
        board: "清单",
        roleTitle: "岗位名称",
        location: "地点",
        salary: "薪资",
        link: "链接",
        note: "备注",
        appliedDate: "投递日期",
        statusNow: "当前状态",
        sourceNow: "投递渠道",
        jdTitle: "JD 标题 / 岗位",
        jdCompany: "公司（可选）",
        jdUrl: "JD 链接（可选）",
        jdTags: "JD 标签（可选）",

    function defaultState(){
      const companies = defaultCompanies();
      const boards = structuredClone(DEFAULT_BOARDS);

      for(const b of boards) b.companyIds = [];
      for(const c of companies){
        const b = boards.find(x => x.id === c.boardId) || boards.find(x => x.id === "personal");
        b.companyIds.push(c.id);
      }

      return {
        version: 3,
        lang: "zh",
        activeTab: "companies",
        activeBoardId: "cn_internet",
        filters: { status:"all", source:"all", q:"" },
        ui: { sideCollapsed: null }, // null -> first init decides based on device
        boards,
        companies,
        jd: []
      };
    }

    let state = loadState();

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return defaultState();
        const parsed = JSON.parse(raw);
        if(!parsed || !parsed.version) return defaultState();
        if(parsed.version !== 3){
          const s = defaultState();
          // 尽量保留老数据（如果结构相近）
          if(parsed.companies) s.companies = parsed.companies;
          if(parsed.boards) s.boards = parsed.boards;
          if(parsed.jd) s.jd = parsed.jd;
          if(parsed.lang) s.lang = parsed.lang;
          if(parsed.activeTab) s.activeTab = parsed.activeTab;
          if(parsed.activeBoardId) s.activeBoardId = parsed.activeBoardId;
          if(parsed.filters) s.filters = parsed.filters;
          if(parsed.ui) s.ui = { ...s.ui, ...parsed.ui };
          return s;
        }
        if(!parsed.ui) parsed.ui = { sideCollapsed: null };
        return parsed;
      }catch(e){
        return defaultState();
      }
    }

    let saveTimer = null;
    function saveState(showToast=true){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        if(showToast) toast(t().toastSaved);
      }catch(e){
        toast("保存失败（LocalStorage）");
      }
    }
    function scheduleSave(){
      clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>saveState(false), 220);
    }

    // -----------------------

    // -----------------------
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
    const t = () => I18N[state.lang];

    function toast(msg){
      const el = $("#toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(el._timer);
      el._timer = setTimeout(()=>{ el.style.display="none"; }, 1500);
    }

    function setText(){
      $("#titleText").textContent = t().title;
      $("#navTitle").textContent = t().pages;
      $("#tabCompanies").textContent = t().companies;
      $("#tabDashboard").textContent = t().dashboard;
      $("#tabJd").textContent = t().jd;

      const wrap = $("#subWrap");

      if(wrap && btn){
        btn.textContent = wrap.classList.contains("collapsed") ? t().toggleDescOpen : t().toggleDescClose;

      syncSideCollapseUI(); // important: language changes
    }

    function statusLabel(key){
      const item = STATUS.find(s=>s.key===key);
      return item ? item[state.lang] : key;
    }
    function sourceLabel(key){
      const item = SOURCE.find(s=>s.key===key);
      return item ? item[state.lang] : key;
    }

    function statusColorVar(key){
      const v = STATUS_COLORS[key] || "--accent";
      return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || "#7aa2ff";
    }

    function normalize(s){ return (s||"").toLowerCase().trim(); }

    // -----------------------
    // Side collapse (bug fix)
    // -----------------------
    function ensureSideDefault(){
      if(state.ui.sideCollapsed === null || typeof state.ui.sideCollapsed === "undefined"){
        // 手机端默认收起；电脑端默认展开
        state.ui.sideCollapsed = isMobile();
        scheduleSave();
      }
      syncSideCollapseUI();
    }

    function syncSideCollapseUI(){
      const side = $("#sidePanel");
      const btn = $("#sideCollapseBtn");
      if(!side || !btn) return;

      const collapsed = !!state.ui.sideCollapsed;

      side.classList.toggle("collapsed", collapsed);
      side.classList.toggle("expanded", !collapsed);

      // 收起后只留标题：CSS 已隐藏 #sideBody
      btn.textContent = collapsed ? t().sideExpand : t().sideCollapse;
    }

    function toggleSide(){
      state.ui.sideCollapsed = !state.ui.sideCollapsed;
      scheduleSave();
      syncSideCollapseUI();
    }

    // -----------------------
    // Render
    // -----------------------
    function render(){
      ensureSideDefault();
      setText();
      renderBoards();
      renderFilters();
      renderTabs();

      const main = $("#main");
      main.innerHTML = "";

      if(state.activeTab === "companies") renderCompanies(main);
      if(state.activeTab === "dashboard") renderDashboard(main);
      if(state.activeTab === "jd") renderJd(main);
    }

    function renderTabs(){
      $$(".tab").forEach(el=>{
        const active = el.dataset.tab === state.activeTab;
        el.classList.toggle("active", active);
      });
    }

    function renderBoards(){
      const list = $("#boardList");
      list.innerHTML = "";

      for(const b of state.boards){
        const div = document.createElement("div");
        div.className = "boardBtn" + (b.id === state.activeBoardId ? " active" : "");
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = (state.lang==="zh" ? b.zh : b.en);

        const desc = document.createElement("div");
        desc.className = "desc";
        desc.textContent = (state.lang==="zh" ? b.descZh : b.descEn);

        div.appendChild(name);
        div.appendChild(desc);

        div.addEventListener("click", ()=>{
          state.activeBoardId = b.id;
          scheduleSave();
          render();
        });

        list.appendChild(div);
      }
    }

    function renderFilters(){
      const statusSel = $("#statusFilter");
      const sourceSel = $("#sourceFilter");
      const q = $("#searchInput");

      statusSel.innerHTML = "";
      for(const s of STATUS){
        const opt = document.createElement("option");
        opt.value = s.key;
        opt.textContent = s[state.lang];
        statusSel.appendChild(opt);
      }
      statusSel.value = state.filters.status;

      sourceSel.innerHTML = "";
      for(const s of SOURCE){
        const opt = document.createElement("option");
        opt.value = s.key;
        opt.textContent = s[state.lang];
        sourceSel.appendChild(opt);
      }
      sourceSel.value = state.filters.source;

      q.value = state.filters.q || "";
    }

    function companiesInActiveBoard(){
      const board = state.boards.find(b=>b.id===state.activeBoardId);
      if(!board) return [];
      const ids = new Set(board.companyIds);
      return state.companies.filter(c=>ids.has(c.id));
    }

    function roleMatchesFilter(role){
      const f = state.filters;
      const statusOk = f.status === "all" ? true : (role.status === f.status);
      const sourceOk = f.source === "all" ? true : (role.source === f.source);
      const q = normalize(f.q);
      if(!q) return statusOk && sourceOk;

      const hay = [
        role.title, role.location, role.salary, role.note, role.link,
        role.status, role.source
      ].join(" ");
      return statusOk && sourceOk && normalize(hay).includes(q);
    }

    function companyMatchesFilter(company){
      const f = state.filters;
      const q = normalize(f.q);

      const companyText = normalize([company.nameZh, company.nameEn, ...(company.tags||[]), company.note||""].join(" "));
      const companyTextOk = q ? companyText.includes(q) : true;

      if(f.status === "all" && f.source === "all"){
        if(q) return companyTextOk || (company.roles||[]).some(r => roleMatchesFilter(r));
        return true;
      }

      return (company.roles||[]).some(r => roleMatchesFilter(r)) || (q && companyTextOk);
    }

    function renderCompanies(main){
      const wrap = document.createElement("div");
      wrap.className = "card";

      const title = document.createElement("div");
      title.className = "sectionTitle";
      title.innerHTML = `
        <div>
          <h2>${t().showCompanies}</h2>
          <div class="muted">${state.lang==="zh" ? "公司下可添加多个岗位。状态/渠道筛选时，只显示匹配的公司及其匹配岗位。" : "Add multiple roles under a company. Status/channel filters show matched companies and matched roles only."}</div>
        </div>
        <div class="chips" id="companyChips"></div>
      `;
      wrap.appendChild(title);

      const companies = companiesInActiveBoard().filter(companyMatchesFilter);

      const chips = title.querySelector("#companyChips");
      const totalRoles = companies.reduce((acc,c)=>acc+(c.roles?.length||0),0);
      const matchedRoles = companies.reduce((acc,c)=>acc+(c.roles||[]).filter(roleMatchesFilter).length,0);

      const chip1 = document.createElement("span");
      chip1.className = "chip";
      chip1.textContent = (state.lang==="zh" ? `公司 ${companies.length}` : `Companies ${companies.length}`);
      const chip2 = document.createElement("span");
      chip2.className = "chip";
      chip2.textContent = (state.lang==="zh"
        ? (state.filters.status==="all" && state.filters.source==="all" ? `岗位 ${totalRoles}` : `匹配岗位 ${matchedRoles}`)
        : (state.filters.status==="all" && state.filters.source==="all" ? `Roles ${totalRoles}` : `Matched roles ${matchedRoles}`)
      );
      chips.appendChild(chip1);
      chips.appendChild(chip2);

      const list = document.createElement("div");
      list.className = "list";

      if(companies.length === 0){
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = t().empty;
        wrap.appendChild(empty);
      }else{
        for(const c of companies){
          list.appendChild(renderCompanyCard(c));
        }
        wrap.appendChild(list);
      }

      main.appendChild(wrap);
    }

    function renderCompanyCard(company){
      const div = document.createElement("div");
      div.className = "company";

      const roles = company.roles || [];
      const matchedRoles = (state.filters.status==="all" && state.filters.source==="all" && !state.filters.q)
        ? roles
        : roles.filter(roleMatchesFilter);

      const statusCounts = countByStatus(roles);
      const activeCount = (roles||[]).filter(r => !["offer","rejected"].includes(r.status)).length;

      const metaBadges = [];
      if(roles.length>0) metaBadges.push(`<span class="badge">${state.lang==="zh" ? "岗位" : "Roles"} ${roles.length}</span>`);
      if(activeCount>0) metaBadges.push(`<span class="badge warn">${state.lang==="zh" ? "进行中" : "Active"} ${activeCount}</span>`);
      if(statusCounts.offer>0) metaBadges.push(`<span class="badge good">Offer ${statusCounts.offer}</span>`);
      if(statusCounts.rejected>0) metaBadges.push(`<span class="badge bad">${state.lang==="zh" ? "拒绝" : "Rejected"} ${statusCounts.rejected}</span>`);

      div.innerHTML = `
        <div class="companyTop">
          <div class="companyName">
            <div class="zh">${escapeHtml(company.nameZh || "—")}</div>
            <div class="en">${escapeHtml(company.nameEn || "")}</div>
          </div>
          <div class="companyMeta">${metaBadges.join("")}</div>
          <div class="companyActions">
            <button class="secondary" data-act="addRole">${t().btnAddRole}</button>
            <button class="ghost" data-act="edit">${t().btnEdit}</button>
            <button class="ghost" data-act="delete">${t().btnDelete}</button>
          </div>
        </div>
        ${(company.tags && company.tags.length) ? `<div class="chips">${company.tags.map(x=>`<span class="chip">#${escapeHtml(x)}</span>`).join("")}</div>` : ""}
        ${company.note ? `<div class="small" style="margin-top:8px">${escapeHtml(company.note)}</div>` : ""}
        <div class="posList" data-role-list></div>
      `;

      div.querySelector('[data-act="addRole"]').addEventListener("click", ()=> openRoleModal(company.id));
      div.querySelector('[data-act="edit"]').addEventListener("click", ()=> openCompanyModal(company.id));
      div.querySelector('[data-act="delete"]').addEventListener("click", ()=> deleteCompany(company.id));

      const roleList = div.querySelector('[data-role-list]');
      if(matchedRoles.length === 0){
        const m = document.createElement("div");
        m.className = "small";
        m.style.marginTop = "6px";
        m.textContent = (roles.length === 0)
          ? (state.lang==="zh" ? "还没有岗位，点「新增岗位」开始记录。" : "No roles yet. Click “Add Role”.")
          : (state.lang==="zh" ? "没有匹配筛选条件的岗位。" : "No roles match the filters.");
        roleList.appendChild(m);
      }else{
        matchedRoles.forEach(r => roleList.appendChild(renderRoleCard(company.id, r)));
      }

      return div;
    }

    function renderRoleCard(companyId, role){
      const div = document.createElement("div");
      div.className = "pos";

      const statusBadge = statusBadgeHtml(role.status);
      const srcBadge = sourceBadgeHtml(role.source);
      const applied = role.appliedDate ? `${t().appliedDate}: ${escapeHtml(role.appliedDate)}` : "";
      const extra = [applied].filter(Boolean).join(" · ");

      div.innerHTML = `
        <div class="posTop">
          <div>
            <div class="posTitle">${escapeHtml(role.title || "—")} ${statusBadge} ${srcBadge}</div>
            <div class="posSub">${escapeHtml([role.location, role.salary].filter(Boolean).join(" · "))}${extra ? (" · " + extra) : ""}</div>
            ${role.note ? `<div class="posSub">${escapeHtml(role.note)}</div>` : ""}
          </div>
          <div class="posActions">
            ${role.link ? `<button class="secondary" data-act="open">${t().btnViewLink}</button>` : ""}
            <button class="ghost" data-act="edit">${t().btnEdit}</button>
            <button class="ghost" data-act="delete">${t().btnDelete}</button>
          </div>
        </div>

        <div class="posGrid">
          <div>
            <label>${t().statusNow}</label>
            <select data-field="status"></select>
          </div>
          <div>
            <label>${t().sourceNow}</label>
            <select data-field="source"></select>
          </div>
          <div>
            <label>${t().location}</label>
            <input data-field="location" type="text" value="${escapeAttr(role.location||"")}"/>
          </div>
          <div>
            <label>${t().salary}</label>
            <input data-field="salary" type="text" value="${escapeAttr(role.salary||"")}"/>
          </div>
          <div>
            <label>${t().appliedDate}</label>
            <input data-field="appliedDate" type="date" value="${escapeAttr(role.appliedDate||"")}"/>
          </div>
        </div>
      `;

      const statusSel = div.querySelector('select[data-field="status"]');
      STATUS.filter(s=>s.key!=="all").forEach(s=>{
        const opt = document.createElement("option");
        opt.value = s.key;
        opt.textContent = s[state.lang];
        statusSel.appendChild(opt);
      });
      statusSel.value = role.status || "interested";

      const srcSel = div.querySelector('select[data-field="source"]');
      SOURCE.filter(s=>s.key!=="all").forEach(s=>{
        const opt = document.createElement("option");
        opt.value = s.key;
        opt.textContent = s[state.lang];
        srcSel.appendChild(opt);
      });
      srcSel.value = role.source || "official";

      const onChange = () => {
        const company = state.companies.find(c=>c.id===companyId);
        if(!company) return;
        const r = (company.roles||[]).find(x=>x.id===role.id);
        if(!r) return;

        r.status = statusSel.value;
        r.source = srcSel.value;
        r.location = div.querySelector('input[data-field="location"]').value.trim();
        r.salary = div.querySelector('input[data-field="salary"]').value.trim();
        r.appliedDate = div.querySelector('input[data-field="appliedDate"]').value;

        r.updatedAt = new Date().toISOString();
        scheduleSave();
        render();
      };

      statusSel.addEventListener("change", onChange);
      srcSel.addEventListener("change", onChange);
      div.querySelectorAll('input[data-field]').forEach(inp=>{
        inp.addEventListener("change", onChange);
      });

      const openBtn = div.querySelector('[data-act="open"]');
      if(openBtn) openBtn.addEventListener("click", ()=> window.open(role.link, "_blank", "noopener,noreferrer"));
      div.querySelector('[data-act="edit"]').addEventListener("click", ()=> openRoleModal(companyId, role.id));
      div.querySelector('[data-act="delete"]').addEventListener("click", ()=> deleteRole(companyId, role.id));

      return div;
    }

      if(!status || status==="all") return "";

    function countByStatus(roles){
      const out = {};
      for(const r of roles){
        const k = r.status || "interested";
        out[k] = (out[k]||0) + 1;
      }
      ["interested","applied","oa","hr","interview","offer","rejected","hold"].forEach(k=> out[k]=out[k]||0);
      return out;
    }

    function drawDonut(canvas, counts){
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = Math.floor(rect.width * dpr);
      const h = Math.floor(260 * dpr);
      canvas.width = w;
      canvas.height = h;

      ctx.clearRect(0,0,w,h);

      const keys = ["interested","applied","oa","hr","interview","offer","rejected","hold"];
      const total = keys.reduce((a,k)=>a+(counts[k]||0),0);

      const cx = w/2, cy = h/2;
      const R = Math.min(w,h) * 0.33;
      const r = R * 0.62;

      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI*2);
      ctx.arc(cx, cy, r, 0, Math.PI*2, true);
      ctx.closePath();
      ctx.fillStyle = "rgba(34,48,91,.35)";
      ctx.fill("evenodd");

      if(total === 0){
        ctx.fillStyle = "rgba(233,236,255,.55)";
        ctx.font = `${Math.floor(14*dpr)}px ${getComputedStyle(document.body).fontFamily}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(state.lang==="zh" ? "暂无岗位数据" : "No role data", cx, cy);
        return;
      }

      let start = -Math.PI/2;
      for(const k of keys){
        const val = counts[k]||0;
        if(val<=0) continue;
        const ang = (val/total) * Math.PI*2;

        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx, cy, R, start, start+ang);
        ctx.closePath();
        ctx.fillStyle = statusColorVar(k);
        ctx.globalAlpha = 0.95;
        ctx.fill();

        start += ang;
      }

      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = "rgba(10,14,28,.92)";
      ctx.fill();

      ctx.fillStyle = "rgba(233,236,255,.9)";
      ctx.font = `${Math.floor(20*dpr)}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(total), cx, cy - 6*dpr);

      ctx.fillStyle = "rgba(233,236,255,.55)";
      ctx.font = `${Math.floor(12*dpr)}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.fillText(state.lang==="zh" ? "岗位总数" : "Total roles", cx, cy + 16*dpr);
    }

        company?.boardId || state.activeBoardId

      const bodyNodes = [fZh.wrap, fEn.wrap, boardSel.wrap, fTags.wrap, fNote.wrap];

      const btnCancel = makeBtn(t().btnCancel, "secondary", ()=> closeModal());

        const nameEn = fEn.input.value.trim();
        if(!nameZh && !nameEn){ toast(state.lang==="zh" ? "至少填一个名称" : "Please enter a name"); return; }

        const tags = fTags.input.value.split(",").map(x=>x.trim()).filter(Boolean);
        const note = fNote.input.value.trim();
        const boardId = boardSel.select.value;

        if(editing){
          company.nameZh = nameZh || company.nameZh;
          company.nameEn = nameEn || company.nameEn;
          company.tags = tags;
          company.note = note;

          if(company.boardId !== boardId){
            moveCompanyToBoard(company.id, boardId);
          }
        }else{
          const c = { id: uid(), nameZh, nameEn, tags, note, boardId, roles: [] };
          state.companies.unshift(c);
          addCompanyToBoard(c.id, boardId);
        }

        scheduleSave();
        closeModal();
        render();
      });

      openModal({
        title: editing ? (state.lang==="zh" ? "编辑公司" : "Edit Company") : (state.lang==="zh" ? "新增公司" : "Add Company"),
        bodyNodes,
        footerButtons: [btnCancel, btnSave]

    function field(labelText, type, value){
      const wrap = document.createElement("div");
      const label = document.createElement("label");
      label.textContent = labelText;
      const input = document.createElement("input");
      input.type = type;
      input.value = value || "";
      wrap.appendChild(label);
      wrap.appendChild(input);
      return { wrap, input };
    }
    function textareaField(labelText, value){
      const wrap = document.createElement("div");
      const label = document.createElement("label");
      label.textContent = labelText;
      const input = document.createElement("textarea");
      input.value = value || "";
      wrap.appendChild(label);
      wrap.appendChild(input);
      return { wrap, input };
    }
    function selectField(labelText, options, value){
      const wrap = document.createElement("div");
      const label = document.createElement("label");
      label.textContent = labelText;
      const select = document.createElement("select");
      for(const o of options){
        const opt = document.createElement("option");
        opt.value = o.value;
        opt.textContent = o.label;
        select.appendChild(opt);
      }
      select.value = value;
      wrap.appendChild(label);
      wrap.appendChild(select);
      return { wrap, select };
    }
    function makeBtn(text, cls, onClick){
      const b = document.createElement("button");
      if(cls) b.className = cls;
      b.type = "button";
      b.textContent = text;
      b.addEventListener("click", onClick);
      return b;
    }

    // -----------------------
    // Mutations
    // -----------------------
    function addCompanyToBoard(companyId, boardId){
      const b = state.boards.find(x=>x.id===boardId);
      if(!b) return;
      if(!b.companyIds.includes(companyId)) b.companyIds.unshift(companyId);
      for(const bb of state.boards){
        if(bb.id!==boardId){
          bb.companyIds = bb.companyIds.filter(id=>id!==companyId);
        }
      }
      const c = state.companies.find(x=>x.id===companyId);
      if(c) c.boardId = boardId;
      state.activeBoardId = boardId;
    }
    function moveCompanyToBoard(companyId, boardId){
      addCompanyToBoard(companyId, boardId);
    }
    function deleteCompany(companyId){
      const c = state.companies.find(x=>x.id===companyId);
      const name = c ? (c.nameZh||c.nameEn) : "";
      if(!confirm((state.lang==="zh" ? "删除公司：" : "Delete company: ") + name + " ?")) return;

      state.companies = state.companies.filter(c=>c.id!==companyId);
      for(const b of state.boards){
        b.companyIds = b.companyIds.filter(id=>id!==companyId);
      }
      scheduleSave();
      render();
    }
    function deleteRole(companyId, roleId){
      const c = state.companies.find(x=>x.id===companyId);
      if(!c) return;
      c.roles = (c.roles||[]).filter(r=>r.id!==roleId);
      scheduleSave();
      render();
    }
    function deleteJd(jdId){
      state.jd = state.jd.filter(x=>x.id!==jdId);
      scheduleSave();
      render();
    }

    function exportJSON(){
      const data = JSON.stringify(state, null, 2);
      const blob = new Blob([data], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `job-hunting-${nowISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast(t().toastExported);
    }

    function importJSONFile(file){
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const parsed = JSON.parse(reader.result);
          if(!parsed || typeof parsed !== "object") throw new Error("invalid");

          if(!parsed.version) parsed.version = 3;
          state = parsed;

          if(!state.boards) state.boards = structuredClone(DEFAULT_BOARDS);
          if(!state.companies) state.companies = [];
          if(!state.jd) state.jd = [];
          if(!state.filters) state.filters = {status:"all", source:"all", q:""};
          if(!state.activeTab) state.activeTab = "companies";
          if(!state.activeBoardId) state.activeBoardId = state.boards?.[0]?.id || "personal";
          if(!state.ui) state.ui = { sideCollapsed: null };

          saveState(false);
          toast(t().toastImported);
          render();
        }catch(e){
          toast(state.lang==="zh" ? "导入失败：JSON 格式不正确" : "Import failed: invalid JSON");
        }
      };
      reader.readAsText(file);
    }

    function resetAll(){
      if(!confirm(t().confirmReset)) return;
      state = defaultState();
      saveState(false);
      toast(t().toastReset);
      render();
    }

    // -----------------------
    // Escape helpers
    // -----------------------
    function escapeHtml(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }
    function escapeAttr(s){
      return escapeHtml(s).replaceAll("\n"," ");
    }

      $("#modalCloseBtn").addEventListener("click", closeModal);
      $("#modalBackdrop").addEventListener("click", (e)=>{
        if(e.target.id === "modalBackdrop") closeModal();
      });
      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeModal();
      });

      // 手机/桌面切换时：只在首次默认逻辑生效；之后按用户选择保持
      window.addEventListener("resize", ()=>{
        // 不强制改用户选择，只刷新 UI class
        syncSideCollapseUI();
      });
    }

    // -----------------------
    // Init
    // -----------------------
    bind();
    render();
  </script>
</body>
</html>
